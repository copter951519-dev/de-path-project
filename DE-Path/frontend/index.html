<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DE-PATH | ภาพรวม</title>
    <meta name="description" content="ภาพรวมทักษะ, คอร์สเรียน, และข้อสอบของคุณ">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="hometheme.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* CSS styles remain the same */
        .exam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .exam-card {
            background-color: var(--glass-bg-darker);
            border-radius: 15px;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .exam-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--glass-stroke);
            padding-bottom: 1rem;
        }
        .card-header i {
            font-size: 2rem;
            color: var(--primary-orange);
            margin-right: 1rem;
            min-width: 40px;
            text-align: center;
        }
        .card-header-text h3 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .card-header-text p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .topic-list ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .topic-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--glass-stroke-darker);
        }
        .topic-list li:last-child {
            border-bottom: none;
        }
        .topic-list .topic-title {
            color: var(--text-primary);
            font-weight: 400;
        }
        .topic-actions a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 1rem;
            transition: color 0.2s ease;
        }
        .topic-actions a:hover {
            color: var(--primary-orange);
        }
        .topic-actions .action-exam {
            background-color: var(--primary-orange-light);
            color: var(--primary-orange);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .topic-actions .action-exam:hover {
            background-color: var(--primary-orange);
            color: white;
        }
    </style>
</head>
<body>
    <div class="main-split-bg"></div>

    <aside class="sidebar-glass" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">DE-PATH</span>
            <i class="fas fa-bars" id="sidebar-toggle"></i>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-group-label">หน้าหลัก</div>
            <a href="home.html" class="nav-item active"><i class="fas fa-home"></i><span class="nav-text">ภาพรวม</span></a>
            <a href="analytics.html" class="nav-item"><i class="fas fa-chart-pie"></i><span class="nav-text">สรุปคะแนน</span></a>

            <div class="nav-group-label">ห้องสอบ</div>
            <a href="exam.html" class="nav-item"><i class="fas fa-pencil-alt"></i><span class="nav-text">ทำข้อสอบ</span></a>
            <a href="ranking.html" class="nav-item"><i class="fas fa-trophy"></i><span class="nav-text">จำลองอันดับ</span></a>

            <div class="nav-group-label">แหล่งข้อมูล</div>
            <a href="resources.html" class="nav-item"><i class="fas fa-university"></i><span class="nav-text">คณะวิศวะฯ</span></a>
            <a href="calendar.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span class="nav-text">ปฏิทินสอบ</span></a>
        </nav>
    </aside>

    <main class="content-glass">
        <header class="page-header">
            <div class="header-title">
                <h1>ภาพรวม</h1>
                <p>ภาพรวมทักษะ, คอร์สเรียน และการสอบของคุณ</p>
            </div>
            <div class="user-profile"> 
                 <div class="user-info">
                    <p id="user-display-name" class="user-name">กำลังโหลด...</p>
                </div>
                <img id="user-photo" class="user-avatar" src="">
            </div>
        </header>

        <!-- Skill Chart Section -->
        <div class="header-title">
            <h2>แผนภาพทักษะ (Skill Chart)</h2>
        </div>
        <div class="chart-container">
            <canvas id="skillRadarChart"></canvas>
        </div>

        <!-- Dynamic Exam List Section -->
        <div class="header-title" style="margin-top: 3rem;">
            <h2>คอร์สเรียนและข้อสอบ</h2>
        </div>
        <div id="exam-grid-container" class="exam-grid">
            <!-- Exam cards will be injected here -->
        </div>

    </main>

    <script>
        // Sidebar and Chart.js logic remains the same
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle');
            const toggleSidebar = () => { sidebar.classList.toggle('collapsed'); localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed')); };
            if (localStorage.getItem('sidebarCollapsed') === 'true') { sidebar.classList.add('collapsed'); }
            toggleBtn.addEventListener('click', toggleSidebar);

            const ctx = document.getElementById('skillRadarChart').getContext('2d');
            const data = { labels: ['คณิตศาสตร์', 'ฟิสิกส์', 'ภาษาอังกฤษ', 'ความถนัดวิศวะ', 'เคมี'], datasets: [{ label: 'ระดับความถนัด', data: [79, 67, 85, 75, 60], fill: true, backgroundColor: 'rgba(249, 115, 22, 0.4)', borderColor: '#FF4500', pointBackgroundColor: '#FF4500', pointBorderColor: '#fff', pointHoverBackgroundColor: '#fff', pointHoverBorderColor: '#FF4500', borderWidth: 2, }] };
            const config = { type: 'radar', data: data, options: { responsive: true, maintainAspectRatio: false, scales: { r: { angleLines: { color: 'rgba(255, 255, 255, 0.2)' }, grid: { color: 'rgba(255, 255, 255, 0.2)' }, pointLabels: { font: { size: 14, family: 'Kanit, sans-serif' }, color: '#F4F4F5' }, ticks: { beginAtZero: true, max: 100, stepSize: 20, backdropColor: 'transparent', font: { size: 10 }, color: 'rgba(244, 244, 245, 0.7)' } } }, plugins: { legend: { display: false } } } };
            new Chart(ctx, config);
        });
    </script>

    <script type="module">
        // Firebase Auth logic remains the same
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { firebaseConfig } from './firebase-config.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userName = user.displayName || user.email.split('@')[0];
                document.getElementById('user-display-name').textContent = userName;
                document.getElementById('user-photo').src = user.photoURL || 'https://i.pravatar.cc/150?u=a042581f4e29026704d';
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>

    <!-- ** NEW **: Client-side logic for rendering courses -->
    <script type="module">
        // We will now store the exam structure directly in the frontend
        // This removes the need for a separate backend call to fetch this data
        const EXAM_STRUCTURE = {
            "TPAT3": {
                title: "TPAT 3",
                description: "ความถนัดด้านวิศวกรรม",
                icon: "fas fa-cogs",
                topics: [
                    { id: "tpat3-drawing", title: "มิติสัมพันธ์และการเขียนแบบ", ai_summary: "ทดสอบความสามารถในการจินตนาการวัตถุ 3 มิติจากภาพ 2 มิติ (ภาพฉาย), การคลี่รูปทรง, และความเข้าใจหลักการเขียนแบบพื้นฐาน" },
                    { id: "tpat3-mechanics", title: "กลศาสตร์ประยุกต์", ai_summary: "เน้นความเข้าใจฟิสิกส์พื้นฐานเพื่อการใช้งานจริง เช่น สมดุล, โมเมนต์, และเครื่องกลอย่างง่าย" },
                    { id: "tpat3-logic", title: "การคิดเชิงตรรกะและจริยธรรม", ai_summary: "วัดทักษะการแก้ปัญหา, การจับใจความ, และการประเมินสถานการณ์ทางจริยธรรมของวิศวกร" }
                ]
            },
            "Math1": {
                title: "A-Level Math 1",
                description: "คณิตศาสตร์ประยุกต์ 1",
                icon: "fas fa-calculator",
                topics: [
                    { id: "math1-set", title: "เซต", ai_summary: "ทำความเข้าใจสัญลักษณ์, การดำเนินการ, และการแก้ปัญหาโดยใช้แผนภาพเวนน์-ออยเลอร์" },
                    { id: "math1-logic", title: "ตรรกศาสตร์", ai_summary: "เน้นการหาค่าความจริงของประพจน์, ตัวบ่งปริมาณ, และการอ้างเหตุผล" },
                    { id: "math1-trigo", title: "ฟังก์ชันตรีโกณมิติ", ai_summary: "ครอบคลุมวงกลมหนึ่งหน่วย, กราฟ, เอกลักษณ์, และกฎของ sine/cosine" },
                    { id: "math1-vector", title: "เวกเตอร์", ai_summary: "ศึกษาการบวกลบ, การคูณ (dot และ cross product), และการประยุกต์ใช้ในเรขาคณิต" },
                    { id: "math1-calculus", title: "แคลคูลัสเบื้องต้น", ai_summary: "หัวข้อใหญ่คือ ลิมิต, อนุพันธ์ (Derivative), และการอินทิเกรตเพื่อหาพื้นที่" }
                ]
            }
        };

        function renderExams() {
            const container = document.getElementById('exam-grid-container');
            if (!container) return;

            let html = '';
            for (const key in EXAM_STRUCTURE) {
                const exam = EXAM_STRUCTURE[key];
                html += `
                <div class="exam-card">
                    <div class="card-header">
                        <i class="${exam.icon || 'fas fa-book-open'}"></i>
                        <div class="card-header-text">
                            <h3>${exam.title}</h3>
                            <p>${exam.description}</p>
                        </div>
                    </div>
                    <div class="topic-list">
                        <ul>`;
                exam.topics.forEach(topic => {
                    html += `
                    <li>
                        <span class="topic-title">${topic.title}</span>
                        <div class="topic-actions">
                            <a href="tutor.html?topic=${topic.id}" title="ติวเนื้อหา"><i class="fas fa-chalkboard-teacher"></i></a>
                            <a href="exam.html?topic=${topic.id}" class="action-exam">เริ่มสอบ</a>
                        </div>
                    </li>`;
                });
                html += `
                        </ul>
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        // Render the courses as soon as the page loads
        renderExams();
    </script>

</body>
</html>
