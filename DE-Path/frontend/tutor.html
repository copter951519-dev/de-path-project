<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DE-PATH | ติวเตอร์ AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="hometheme.css">
    <style>
        body, html {
            height: 100%;
            overflow: hidden; /* Prevent scrolling on the body */
        }
        .content-glass {
            max-width: 900px;
            margin: 1rem auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 2rem); /* Full height minus margin */
            box-sizing: border-box;
        }
        .tutor-header {
            text-align: center;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }
        .tutor-header i {
            font-size: 2.5rem;
            color: var(--primary-orange);
        }
        .tutor-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0.5rem 0;
        }

        /* Chat History */
        .chat-history {
            flex-grow: 1;
            overflow-y: auto;
            background-color: var(--glass-bg-darker);
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 1rem;
        }
        .chat-message {
            margin-bottom: 1.25rem;
            display: flex;
            max-width: 95%;
        }
        .chat-message .avatar {
            font-size: 1.5rem;
            margin-right: 1rem;
            flex-shrink: 0;
        }
        .chat-message .message-content {
            background-color: var(--glass-bg);
            padding: 0.75rem 1.25rem;
            border-radius: 15px;
            line-height: 1.7;
        }
        .chat-message.user {
            justify-content: flex-end;
            margin-left: auto;
        }
        .chat-message.user .message-content {
            background-color: var(--primary-orange-light);
            color: #fff;
        }
        .chat-message.bot {
            justify-content: flex-start;
            margin-right: auto;
        }
        .chat-message.bot .avatar {
            color: var(--primary-orange);
        }
        .chat-message.loading .message-content {
            display: flex; align-items: center; 
        }
        .dot-flashing {
            position: relative; width: 10px; height: 10px;
            border-radius: 5px; background-color: var(--text-secondary);
            color: var(--text-secondary); animation: dot-flashing 1s infinite linear alternate;
            animation-delay: .5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: ''; display: inline-block; position: absolute; top: 0;
            width: 10px; height: 10px; border-radius: 5px;
            background-color: var(--text-secondary); color: var(--text-secondary);
        }
        .dot-flashing::before { left: -15px; animation: dot-flashing 1s infinite alternate; animation-delay: 0s; }
        .dot-flashing::after { left: 15px; animation: dot-flashing 1s infinite alternate; animation-delay: 1s; }
        @keyframes dot-flashing { 0% { background-color: var(--text-secondary); } 50%, 100% { background-color: rgba(150, 150, 150, 0.4); } }

        /* Input Form */
        .chat-input-form {
            display: flex; flex-shrink: 0;
        }
        #prompt-input {
            flex-grow: 1; padding: 0.85rem 1.25rem;
            border: 2px solid var(--glass-stroke); border-radius: 15px;
            background-color: var(--glass-bg); color: var(--text-primary);
            font-size: 1rem; transition: border-color 0.3s;
        }
        #prompt-input:focus { border-color: var(--primary-orange); outline: none; }
        #send-button {
            background-color: var(--primary-orange); color: white;
            border: none; padding: 0.85rem 1.75rem; border-radius: 15px;
            margin-left: 1rem; cursor: pointer; font-size: 1rem; transition: background-color 0.3s;
        }
        #send-button:disabled { background-color: #a0a0a0; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="main-split-bg"></div>
    <aside class="sidebar-glass" id="sidebar"></aside>

    <main class="content-glass">
        <div class="tutor-header">
            <i class="fas fa-chalkboard-teacher"></i>
            <h1>ติวเตอร์ AI (DE-PATH)</h1>
        </div>

        <div class="chat-history" id="chat-history">
            <div class="chat-message bot">
                <span class="avatar"><i class="fas fa-brain"></i></span>
                <div class="message-content">
                    <p>สวัสดีครับ! ผมคือติวเตอร์ AI จาก DE-PATH มีอะไรให้ผมช่วยในการเตรียมตัวสอบเข้าวิศวะฯ บ้างไหมครับ ถามได้เลย!</p>
                </div>
            </div>
        </div>

        <form class="chat-input-form" id="prompt-form">
            <input type="text" id="prompt-input" placeholder="เช่น 'ช่วยอธิบายเรื่องกฎของโอห์มหน่อย'" autocomplete="off">
            <button type="submit" id="send-button"><i class="fas fa-paper-plane"></i></button>
        </form>
    </main>

    <script>
        // Load sidebar
        fetch('sidebar.html').then(r => r.text()).then(data => {
            document.getElementById('sidebar').innerHTML = data;
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle');
            if (localStorage.getItem('sidebarCollapsed') === 'true') sidebar.classList.add('collapsed');
            if (toggleBtn) toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('collapsed');
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
            });
        });
    </script>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const promptForm = document.getElementById('prompt-form');
        const promptInput = document.getElementById('prompt-input');
        const sendButton = document.getElementById('send-button');
        const API_URL = '/api/generate'; // CORRECTED: Use relative path for deployed API

        promptForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            addMessageToHistory('user', prompt);
            promptInput.value = '';
            promptInput.focus();
            showLoadingIndicator();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt }),
                });

                removeLoadingIndicator();

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Failed to get response from AI.');
                }

                const data = await response.json();
                addMessageToHistory('bot', data.generatedText);

            } catch (error) {
                console.error("Error:", error);
                removeLoadingIndicator();
                addMessageToHistory('bot', `ขออภัยครับ, เกิดข้อผิดพลาด: ${error.message}`);
            }
        });

        function addMessageToHistory(sender, message) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('chat-message', sender);
            const avatar = sender === 'user'
                ? '<span class="avatar"><i class="fas fa-user"></i></span>'
                : '<span class="avatar"><i class="fas fa-brain"></i></span>';

            const formattedMessage = message.replace(/\n/g, '<br>');

            messageElement.innerHTML = `
                ${avatar}
                <div class="message-content"><p>${formattedMessage}</p></div>
            `;
            chatHistory.appendChild(messageElement);
            scrollToBottom();
        }

        function showLoadingIndicator() {
            const loadingElement = document.createElement('div');
            loadingElement.classList.add('chat-message', 'bot', 'loading');
            loadingElement.innerHTML = `
                <span class="avatar"><i class="fas fa-brain"></i></span>
                <div class="message-content"><div class="dot-flashing"></div></div>
            `;
            chatHistory.appendChild(loadingElement);
            scrollToBottom();
        }

        function removeLoadingIndicator() {
            const loadingElement = chatHistory.querySelector('.loading');
            if (loadingElement) loadingElement.remove();
        }

        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
