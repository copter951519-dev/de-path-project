<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DE-PATH | ห้องสอบ AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="hometheme.css">
    <style>
        .content-glass { max-width: 900px; margin: 2rem auto; padding: 2.5rem; }
        .exam-header { text-align: center; margin-bottom: 2rem; }
        .exam-header h1 { font-size: 2.25rem; } 
        .exam-container { background-color: var(--glass-bg-darker); padding: 2rem; border-radius: 15px; }
        .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; }
        .loading-spinner i { font-size: 3rem; color: var(--primary-orange); animation: spin 1.5s linear infinite; }
        .loading-spinner p { margin-top: 1rem; font-size: 1.2rem; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .question-container { margin-bottom: 2rem; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; }
        .choices-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        .choice-btn { background-color: var(--glass-bg); border: 1px solid var(--glass-stroke); color: var(--text-primary); padding: 1rem; border-radius: 10px; text-align: left; cursor: pointer; transition: all 0.2s ease; }
        .choice-btn:hover { background-color: var(--glass-stroke); }
        .choice-btn.selected { border-color: var(--primary-orange); background-color: rgba(249, 115, 22, 0.2); }
        .choice-btn.correct { border-color: #22c55e; background-color: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .choice-btn.incorrect { border-color: #ef4444; background-color: rgba(239, 68, 68, 0.2); color: #ef4444; }
        #submit-btn { background-color: var(--primary-orange); color: white; padding: 1rem 2rem; border-radius: 10px; font-size: 1.1rem; cursor: pointer; display: block; margin: 2rem auto 0; }
        #results-container { text-align: center; }
    </style>
</head>
<body>
    <div class="main-split-bg"></div>
    <aside class="sidebar-glass" id="sidebar"></aside>
    <main class="content-glass">
        <div class="exam-header">
            <h1 id="topic-title">กำลังโหลดข้อสอบ...</h1>
            <p id="topic-description">AI กำลังสร้างชุดข้อสอบแบบปรนัยสำหรับคุณ</p>
        </div>
        <div id="exam-container" class="exam-container">
            <div id="loading-state" class="loading-spinner">
                <i class="fas fa-pencil-ruler"></i>
                <p>AI กำลังออกแบบข้อสอบ...</p>
            </div>
            <div id="quiz-content" style="display: none;"></div>
            <div id="results-container" style="display: none;"></div>
            <button id="submit-btn" style="display: none;">ส่งคำตอบ</button>
        </div>
    </main>

    <script>
        fetch('sidebar.html').then(r => r.text()).then(data => {
            document.getElementById('sidebar').innerHTML = data;
            const sidebar = document.getElementById('sidebar'), toggleBtn = document.getElementById('sidebar-toggle');
            const toggleSidebar = () => { sidebar.classList.toggle('collapsed'); localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed')); };
            if (localStorage.getItem('sidebarCollapsed') === 'true') sidebar.classList.add('collapsed');
            if(toggleBtn) toggleBtn.addEventListener('click', toggleSidebar);
        });
    </script>

    <script type="module">
        // CORRECTED: Import shared instances from config
        import { app, auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getVertexAI, getGenerativeModel } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-vertexai-web.js";

        const EXAM_STRUCTURE = {
            "TPAT3": { title: "TPAT 3", topics: [ { id: "tpat3-drawing", title: "มิติสัมพันธ์และการเขียนแบบ", ai_summary: "ทดสอบความสามารถในการจินตนาการวัตถุ 3 มิติจากภาพ 2 มิติ (ภาพฉาย), การคลี่รูปทรง, และความเข้าใจหลักการเขียนแบบพื้นฐาน" }, { id: "tpat3-mechanics", title: "กลศาสตร์ประยุกต์", ai_summary: "เน้นความเข้าใจฟิสิกส์พื้นฐานเพื่อการใช้งานจริง เช่น สมดุล, โมเมนต์, และเครื่องกลอย่างง่าย" }, { id: "tpat3-logic", title: "การคิดเชิงตรรกะและจริยธรรม", ai_summary: "วัดทักษะการแก้ปัญหา, การจับใจความ, และการประเมินสถานการณ์ทางจริยธรรมของวิศวกร" } ] },
            "Math1": { title: "A-Level Math 1", topics: [ { id: "math1-set", title: "เซต", ai_summary: "ทำความเข้าใจสัญลักษณ์, การดำเนินการ, และการแก้ปัญหาโดยใช้แผนภาพเวนน์-ออยเลอร์" }, { id: "math1-logic", title: "ตรรกศาสตร์", ai_summary: "เน้นการหาค่าความจริงของประพจน์, ตัวบ่งปริมาณ, และการอ้างเหตุผล" }, { id: "math1-trigo", title: "ฟังก์ชันตรีโกณมิติ", ai_summary: "ครอบคลุมวงกลมหนึ่งหน่วย, กราฟ, เอกลักษณ์, และกฎของ sine/cosine" }, { id: "math1-vector", title: "เวกเตอร์", ai_summary: "ศึกษาการบวกลบ, การคูณ (dot และ cross product), และการประยุกต์ใช้ในเรขาคณิต" }, { id: "math1-calculus", title: "แคลคูลัสเบื้องต้น", ai_summary: "หัวข้อใหญ่คือ ลิมิต, อนุพันธ์ (Derivative), และการอินทิเกรตเพื่อหาพื้นที่" } ] }
        };

        function findTopicById(topicId) {
            for (const key in EXAM_STRUCTURE) {
                const topic = EXAM_STRUCTURE[key].topics.find(t => t.id === topicId);
                if (topic) return topic;
            }
            return null;
        }

        const loadingState = document.getElementById('loading-state');
        const quizContent = document.getElementById('quiz-content');
        const topicTitle = document.getElementById('topic-title');
        const submitBtn = document.getElementById('submit-btn');
        const resultsContainer = document.getElementById('results-container');
        let questions = [];

        async function generateExam(topic) {
            try {
                // CORRECTED: Use imported 'app' instance
                const vertexAI = getVertexAI(app);
                const model = getGenerativeModel({ 
                    model: "gemini-1.5-flash-preview-0514",
                    generationConfig: { responseMimeType: "application/json" }
                });

                const prompt = `สร้างข้อสอบปรนัย 4 ตัวเลือก จำนวน 5 ข้อ สำหรับการสอบเข้ามหาวิทยาลัยในประเทศไทยในหัวข้อ "${topic.title}" (${topic.ai_summary}) โดยเน้นคำถามที่ต้องใช้การวิเคราะห์ ไม่ใช่แค่การท่องจำ และต้องตอบกลับมาในรูปแบบ JSON structure เท่านั้น ตามรูปแบบนี้:
                {
                  "questions": [
                    {
                      "question_text": "คำถามข้อที่ 1",
                      "choices": ["ตัวเลือก ก", "ตัวเลือก ข", "ตัวเลือก ค", "ตัวเลือก ง"],
                      "correct_answer_index": 0, // index ของคำตอบที่ถูกต้อง (0-3)
                      "explanation": "คำอธิบายว่าทำไมคำตอบนี้จึงถูกต้อง"
                    }
                  ]
                }`;

                const result = await model.generateContent(prompt);
                const response = await result.response;
                const jsonResponse = JSON.parse(response.text());
                questions = jsonResponse.questions;
                displayQuestions();

            } catch (error) {
                console.error("Error calling Gemini API:", error);
                quizContent.innerHTML = `<p style="color: #ff6b6b;">เกิดข้อผิดพลาดในการสร้างข้อสอบ กรุณาลองใหม่อีกครั้ง</p>`;
                loadingState.style.display = 'none';
                quizContent.style.display = 'block';
            }
        }

        function displayQuestions() {
            let html = '';
            questions.forEach((q, index) => {
                html += `<div class="question-container" id="q-${index}">
                    <p class="question-text">${index + 1}. ${q.question_text}</p>
                    <div class="choices-grid">`;
                q.choices.forEach((choice, i) => {
                    html += `<button class="choice-btn" data-question="${index}" data-choice="${i}">${choice}</button>`;
                });
                html += `</div></div>`;
            });
            quizContent.innerHTML = html;
            loadingState.style.display = 'none';
            quizContent.style.display = 'block';
            submitBtn.style.display = 'block';

            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const qIndex = btn.dataset.question;
                    document.querySelectorAll(`.choice-btn[data-question='${qIndex}']`).forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                });
            });
        }

        submitBtn.addEventListener('click', () => {
            let score = 0;
            questions.forEach((q, index) => {
                const selectedBtn = document.querySelector(`.choice-btn[data-question='${index}'].selected`);
                const choiceBtns = document.querySelectorAll(`.choice-btn[data-question='${index}']`);
                choiceBtns.forEach(btn => btn.disabled = true); // Disable all buttons after submission

                if (selectedBtn) {
                    const selectedAnswer = parseInt(selectedBtn.dataset.choice);
                    if (selectedAnswer === q.correct_answer_index) {
                        score++;
                        selectedBtn.classList.add('correct');
                    } else {
                        selectedBtn.classList.add('incorrect');
                        choiceBtns[q.correct_answer_index].classList.add('correct');
                    }
                } else {
                    choiceBtns[q.correct_answer_index].classList.add('correct');
                }
            });
            showResults(score, questions.length);
        });

        function showResults(score, total) {
             resultsContainer.innerHTML = `
                <h2>ผลการสอบ</h2>
                <p>คุณทำได้ ${score} เต็ม ${total} คะแนน</p>
                <a href="home.html" style="color: var(--primary-orange);">กลับไปหน้าแรก</a>
            `;
            resultsContainer.style.display = 'block';
            quizContent.style.display = 'none';
            submitBtn.style.display = 'none';
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            // CORRECTED: Use imported 'auth' instance
            onAuthStateChanged(auth, user => {
                if (user) {
                    const params = new URLSearchParams(window.location.search);
                    const topicId = params.get('topic');
                    const topic = findTopicById(topicId);
                    if (topic) {
                        topicTitle.textContent = `ข้อสอบเรื่อง: ${topic.title}`;
                        generateExam(topic);
                    } else {
                        topicTitle.textContent = 'ไม่พบหัวข้อ';
                        loadingState.style.display = 'none';
                    }
                } else {
                    window.location.href = 'login.html';
                }
            });
        });
    </script>
</body>
</html>
