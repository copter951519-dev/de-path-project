<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DE-PATH | Gateway</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Link to the new external CSS file -->
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="main-split-bg"></div>

    <div class="big-circle-frame">
        <div class="content-wrapper">
            <div class="title-box">
                <h1 id="auth-title">LOGIN</h1>
                <p class="quote" id="auth-desc">Gateway Access</p>
                
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder="USER EMAIL">
                    <input type="password" id="pass" class="input-field" placeholder="PASSWORD">
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="main-btn">GO</button>
                    
                    <button class="btn-google" id="google-login-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81.64z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        SIGN IN
                    </button>
                </div>

                <p class="footer-link">
                    No account? <span id="toggle-auth">Create one</span>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        // 2. Import Config
        import { firebaseConfig } from './firebase-config.js';

        // 3. Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // --- UI Elements ---
        const toggleBtn = document.getElementById('toggle-auth');
        const authTitle = document.getElementById('auth-title');
        const authDesc = document.getElementById('auth-desc');
        const mainBtn = document.getElementById('main-btn');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const emailField = document.getElementById('email');
        const passField = document.getElementById('pass');

        let isLogin = true;

        // --- Success Redirect ---
        const handleSuccess = () => {
            window.location.href = 'home.html';
        };

        // --- Event Listeners ---
        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            authTitle.innerText = isLogin ? "LOGIN" : "JOIN";
            authDesc.innerText = isLogin ? "Gateway Access" : "New Identity";
            mainBtn.innerText = isLogin ? "GO" : "UP";
            toggleBtn.innerText = isLogin ? "Create one" : "Login instead";
        });

        // Login / Register ปกติ
        mainBtn.addEventListener('click', async () => {
            const email = emailField.value;
            const password = passField.value;
            if (!email || !password) return alert('กรุณาป้อนอีเมลและรหัสผ่าน');

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert('สร้างบัญชีสำเร็จ!');
                }
                handleSuccess();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        });

        // Google Sign In (คลีนสุดๆ)
        googleLoginBtn.addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
                handleSuccess();
            } catch (error) {
                console.error("Google Auth Error:", error.code);
                alert(`ติดปัญหา: ${error.message}`);
            }
        });
    </script>
</body>
</html>
