
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DE-PATH | แผนภาพทักษะ</title>
    <meta name="description" content="ภาพรวมทักษะและความถนัดในการเตรียมสอบของคุณในรูปแบบ Radar Chart">

    <!-- CSS and Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Link to the main theme CSS for consistent styling -->
    <link rel="stylesheet" href="hometheme.css">
    
    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>
    <!-- Background Effect from hometheme.css -->
    <div class="main-split-bg"></div>

    <!-- Main content centered on the page -->
    <main class="content-glass" style="margin: auto; max-width: 1000px; min-height: auto;">
        <header class="page-header">
            <div class="header-title">
                <h1>แผนภาพทักษะ (Skill Chart)</h1>
                <p>ภาพรวมความถนัดใน 5 วิชาหลักของคุณ</p>
            </div>
            <div class="user-profile">
                <div class="user-info">
                    <p id="user-display-name" class="user-name">กำลังโหลด...</p>
                </div>
                <img id="user-photo" class="user-avatar" src="https://t.ly/lG1aD"> <!-- Generic Avatar -->
            </div>
        </header>

        <!-- Radar Chart Container -->
        <div class="chart-container">
            <canvas id="skillRadarChart"></canvas>
        </div>
    </main>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in.
                const displayName = user.displayName;
                const photoURL = user.photoURL;

                document.getElementById('user-display-name').textContent = displayName || 'User';
                if (photoURL) {
                    document.getElementById('user-photo').src = photoURL;
                }
            } else {
                // User is signed out.
                // Redirect to login page or show a message.
                window.location.href = '/login.html';
            }
        });
    </script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('skillRadarChart').getContext('2d');

            const data = {
                labels: [
                    'คณิตศาสตร์', 
                    'ฟิสิกส์', 
                    'ภาษาอังกฤษ', 
                    'ความถนัดวิศวะ',
                    'เคมี'
                ],
                datasets: [{
                    label: 'ระดับความถนัด',
                    data: [79, 67, 85, 75, 60], // Sample skill data
                    fill: true,
                    backgroundColor: 'rgba(249, 115, 22, 0.4)', // Vermilion Orange fill
                    borderColor: '#FF4500', // Vermilion Orange border
                    pointBackgroundColor: '#FF4500',
                    pointBorderColor: '#fff',
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: '#FF4500',
                    borderWidth: 2,
                }]
            };

            const config = {
                type: 'radar',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: {
                                color: 'rgba(255, 255, 255, 0.2)' 
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.2)'
                            },
                            pointLabels: {
                                font: {
                                    size: 14,
                                    family: 'Kanit, sans-serif'
                                },
                                color: '#F4F4F5'
                            },
                            ticks: {
                                beginAtZero: true,
                                max: 100,
                                stepSize: 20,
                                backdropColor: 'transparent',
                                font: {
                                    size: 10
                                },
                                color: 'rgba(244, 244, 245, 0.7)'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            };

            new Chart(ctx, config);
        });
    </script>
</body>
</html>
