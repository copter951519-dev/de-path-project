<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DE-PATH | ระบบคิดคะแนน %</title>
    <meta name="description" content="คำนวณคะแนนสอบเทียบตามสัดส่วนของแต่ละคณะเพื่อประเมินโอกาสในการสอบเข้า">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="hometheme.css">
    <link rel="stylesheet" href="calculator.css">

</head>
<body>
    <div class="main-split-bg"></div>

    <aside class="sidebar-glass" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">DE-PATH</span>
            <i class="fas fa-bars" id="sidebar-toggle"></i>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-group-label">หน้าหลัก</div>
            <a href="home.html" class="nav-item"><i class="fas fa-user-chart"></i><span class="nav-text">ภาพรวมทักษะ</span></a>
            <a href="analytics.html" class="nav-item"><i class="fas fa-chart-pie"></i><span class="nav-text">สรุปคะแนน</span></a>

            <div class="nav-group-label">ห้องสอบ</div>
            <a href="exam.html" class="nav-item"><i class="fas fa-pencil-alt"></i><span class="nav-text">ทำข้อสอบ</span></a>
            <a href="calculator.html" class="nav-item active"><i class="fas fa-calculator"></i><span class="nav-text">คิดคะแนน %</span></a>
            <a href="ranking.html" class="nav-item"><i class="fas fa-trophy"></i><span class="nav-text">จำลองอันดับ</span></a>

            <div class="nav-group-label">แหล่งข้อมูล</div>
            <a href="resources.html" class="nav-item"><i class="fas fa-university"></i><span class="nav-text">คณะวิศวะฯ</span></a>
            <a href="calendar.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span class="nav-text">ปฏิทินสอบ</span></a>
        </nav>
    </aside>

    <main class="content-glass" id="calculator-content">
        <header class="page-header">
            <div class="header-title">
                <h1>ระบบคิดคะแนน TCAS</h1>
                <p>คำนวณคะแนนตามสัดส่วนของคณะวิศวกรรมศาสตร์ในแต่ละมหาวิทยาลัย</p>
            </div>
        </header>

        <div class="calculator-container">
            <div class="score-input-section">
                <h2><i class="fas fa-edit"></i> กรอกคะแนนของคุณ (เต็ม 100)</h2>
                <div class="score-grid" id="score-fields-container">
                    <!-- Score input fields will be inserted here by JS -->
                </div>
            </div>

            <div class="weight-config-section">
                 <h2><i class="fas fa-balance-scale"></i> เลือกสัดส่วนคะแนน</h2>
                <select id="university-preset-select" class="preset-select">
                    <option value="custom">-- เลือกมหาวิทยาลัย (หรือกำหนดเอง) --</option>
                    <!-- Options will be added by JS -->
                </select>
                <div class="weight-grid" id="weight-fields-container">
                    <!-- Weight input fields will be inserted here by JS -->
                </div>
                 <button id="calculate-btn" class="btn-primary"><i class="fas fa-rocket"></i> คำนวณคะแนนรวม</button>
            </div>

            <div class="result-section hidden" id="result-section">
                <h2><i class="fas fa-poll"></i> ผลการคำนวณ</h2>
                <p class="result-university" id="result-university-name"></p>
                <div class="final-score-container">
                    <span class="final-score-label">คะแนนรวมของคุณคือ</span>
                    <span class="final-score" id="final-score-display">0.00</span>
                    <span class="total-score-base">/ 100</span>
                </div>
                <div class="score-breakdown-container" id="score-breakdown-container">
                    <!-- Detailed breakdown will be added here by JS -->
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        // --- Sidebar Logic (Copied) ---
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle');
            if (sidebar && toggleBtn) {
                const toggleSidebar = () => {
                    sidebar.classList.toggle('collapsed');
                    localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
                };
                if (localStorage.getItem('sidebarCollapsed') === 'true') {
                    sidebar.classList.add('collapsed');
                }
                toggleBtn.addEventListener('click', toggleSidebar);
            }
        });

        // --- Calculator Logic ---
        const subjects = {
            "TGAT": { name: "TGAT", score: 0, weight: 0 },
            "TPAT3": { name: "TPAT3 (วิศวะ)", score: 0, weight: 0 },
            "A-Level Math": { name: "A-Level คณิต 1", score: 0, weight: 0 },
            "A-Level Physics": { name: "A-Level ฟิสิกส์", score: 0, weight: 0 },
            "A-Level Chem": { name: "A-Level เคมี", score: 0, weight: 0 },
            "A-Level Eng": { name: "A-Level อังกฤษ", score: 0, weight: 0 },
        };

        const presets = {
            "chula-engineering": {
                name: "วิศวกรรมศาสตร์ จุฬาฯ",
                weights: { "TGAT": 20, "TPAT3": 60, "A-Level Math": 20 }
            },
            "kmitl-engineering": {
                name: "วิศวกรรมศาสตร์ ลาดกระบัง",
                weights: { "TGAT": 20, "TPAT3": 30, "A-Level Math": 30, "A-Level Physics": 20 }
            },
             "kmutt-engineering": {
                name: "วิศวกรรมศาสตร์ บางมด",
                weights: { "A-Level Math": 30, "A-Level Physics": 40, "A-Level Eng": 30 }
            }
            // Add more presets here
        };

        const scoreContainer = document.getElementById('score-fields-container');
        const weightContainer = document.getElementById('weight-fields-container');
        const presetSelect = document.getElementById('university-preset-select');
        const calculateBtn = document.getElementById('calculate-btn');
        const resultSection = document.getElementById('result-section');
        const resultUniName = document.getElementById('result-university-name');
        const finalScoreDisplay = document.getElementById('final-score-display');
        const breakdownContainer = document.getElementById('score-breakdown-container');

        // 1. Create UI fields
        function createUI() {
            let scoreHtml = '';
            let weightHtml = '';

            for(const key in subjects) {
                scoreHtml += `
                    <div class="input-group">
                        <label for="score-${key}">${subjects[key].name}</label>
                        <input type="number" id="score-${key}" class="score-input" placeholder="0-100" min="0" max="100">
                    </div>`;
                weightHtml += `
                     <div class="input-group">
                        <label for="weight-${key}">${subjects[key].name} (%)</label>
                        <input type="number" id="weight-${key}" class="weight-input" placeholder="0-100" min="0" max="100">
                    </div>`;
            }
            scoreContainer.innerHTML = scoreHtml;
            weightContainer.innerHTML = weightHtml;

            for(const key in presets) {
                presetSelect.innerHTML += `<option value="${key}">${presets[key].name}</option>`;
            }
        }

        // 2. Handle Preset Selection
        presetSelect.addEventListener('change', (e) => {
            const selectedPresetKey = e.target.value;
            // Reset all weights to 0
            for(const key in subjects) {
                subjects[key].weight = 0;
            }
            // Apply preset weights
            if (selectedPresetKey !== 'custom') {
                const presetWeights = presets[selectedPresetKey].weights;
                for(const key in presetWeights) {
                    if(subjects[key]) {
                        subjects[key].weight = presetWeights[key];
                    }
                }
            }
            // Update UI
            for(const key in subjects) {
                document.getElementById(`weight-${key}`).value = subjects[key].weight || '';
            }
        });

        // 3. Calculate Score
        calculateBtn.addEventListener('click', () => {
            let totalWeightedScore = 0;
            let totalWeight = 0;
            let breakdownHtml = '<h4>สัดส่วนคะแนน:</h4><ul>';

            // Get scores and weights from UI
            for(const key in subjects) {
                subjects[key].score = parseFloat(document.getElementById(`score-${key}`).value) || 0;
                subjects[key].weight = parseFloat(document.getElementById(`weight-${key}`).value) || 0;
            }
            
            // Calculate
            for(const key in subjects) {
                if(subjects[key].weight > 0) {
                    const weightedScore = (subjects[key].score * subjects[key].weight) / 100;
                    totalWeightedScore += weightedScore;
                    totalWeight += subjects[key].weight;
                    breakdownHtml += `<li>${subjects[key].name}: <strong>${weightedScore.toFixed(2)}</strong> (จาก ${subjects[key].weight}%)</li>`;
                }
            }
            breakdownHtml += `</ul><p class="total-weight">น้ำหนักรวม: ${totalWeight}%</p>`;

            // Display result
            resultSection.classList.remove('hidden');
            const selectedOption = presetSelect.options[presetSelect.selectedIndex];
            resultUniName.textContent = selectedOption.value !== 'custom' ? selectedOption.text : 'สัดส่วนที่กำหนดเอง';
            finalScoreDisplay.textContent = totalWeightedScore.toFixed(2);
            breakdownContainer.innerHTML = breakdownHtml;

            if(totalWeight !== 100) {
                 breakdownContainer.innerHTML += `<div class="warning-box"><strong>ข้อควรระวัง:</strong> สัดส่วนน้ำหนักรวมไม่เท่ากับ 100% (ตอนนี้รวมได้ ${totalWeight}%)</div>`;
            }

            // Scroll to result
            resultSection.scrollIntoView({ behavior: 'smooth' });
        });

        // Initial setup
        createUI();

    </script>
</body>
</html>
