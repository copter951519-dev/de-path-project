<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>DE-PATH | Score Calculator</title>
    <link rel="stylesheet" href="home.css">
    <style>
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
        .input-card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--primary-red); margin-bottom: 8px; letter-spacing: 1px; }
        .input-group input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none; }
        .input-group input:focus { border-color: var(--primary-red); }
        .result-display { background: rgba(204,0,0,0.05); border: 1px solid var(--primary-red); border-radius: 16px; padding: 30px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        
        /* เพิ่ม Animation เวลาตัวเลขเปลี่ยน */
        #total-display { transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* เอฟเฟกต์ปุ่มกดตามที่มึงขอ */
        .fx-push {
            transition: all 0.2s ease;
        }

        .fx-push:hover {
            transform: translateY(3px); /* ยุบลง 3px */
            filter: brightness(1.2);
            box-shadow: 0 5px 15px rgba(204, 0, 0, 0.4);
        }

        .fx-push:active {
            transform: translateY(5px); /* กดแล้วยุบเพิ่มเป็น 5px */
            filter: brightness(0.9);
        }
    </style>
</head>
<body>
    <div class="main-split-bg"></div>
    <aside class="sidebar-glass">
        <nav class="sidebar-nav">
            <a href="home.html" class="nav-item">🏠 Dashboard</a>
            <a href="calculator.html" class="nav-item active">🧮 Score Calculator</a>
        </nav>
    </aside>

    <main class="content-glass">
    <h1 style="letter-spacing: 2px;">SCORE CALCULATOR (NETSAT & TCAS)</h1>
    <p style="font-size:0.7rem; opacity:0.5;">คำนวณคะแนนรวมตามเกณฑ์วิศวกรรมศาสตร์ (รองรับ NETSAT มข.)</p>

    <div class="calc-grid" style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 25px;">
        <div class="input-card" style="background:rgba(255,255,255,0.02); border:1px solid var(--glass-border); border-radius:16px; padding:25px;">
            
            <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed rgba(255, 215, 0, 0.2);">
                <h4 style="color:#ffd700; margin-bottom:15px; font-size:0.8rem;"><i class="fas fa-star"></i> NETSAT SECTION (Quota มข.)</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label style="font-size:0.7rem; color:#ffd700;">NETSAT Math</label>
                        <input type="number" id="netsatMath" placeholder="เต็ม 100" style="width:100%; padding:10px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,215,0,0.3); border-radius:8px; color:#fff;">
                    </div>
                    <div class="input-group">
                        <label style="font-size:0.7rem; color:#ffd700;">NETSAT Science</label>
                        <input type="number" id="netsatSci" placeholder="เต็ม 100" style="width:100%; padding:10px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,215,0,0.3); border-radius:8px; color:#fff;">
                    </div>
                </div>
            </div>

            <h4 style="color:var(--primary-red); margin-bottom:15px; font-size:0.8rem;"><i class="fas fa-file-alt"></i> TCAS SECTION (A-Level / TPAT3)</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div class="input-group">
                    <label style="font-size:0.7rem;">TPAT3 (30%)</label>
                    <input type="number" id="tpat3" placeholder="เต็ม 100" style="width:100%; padding:10px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:#fff;">
                </div>
                <div class="input-group">
                    <label style="font-size:0.7rem;">Math 1 (30%)</label>
                    <input type="number" id="math1" placeholder="เต็ม 100" style="width:100%; padding:10px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:#fff;">
                </div>
                <div class="input-group">
                    <label style="font-size:0.7rem;">Physics (20%)</label>
                    <input type="number" id="physics" placeholder="เต็ม 100" style="width:100%; padding:10px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:#fff;">
                </div>
                <div class="input-group">
                    <label style="font-size:0.7rem;">English (20%)</label>
                    <input type="number" id="english" placeholder="เต็ม 100" style="width:100%; padding:10px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:#fff;">
                </div>
            </div>

            <button onclick="runCalculation()" class="fx-push" style="width:100%; padding:15px; background:var(--primary-red); border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer; box-shadow: 0 4px 15px rgba(204,0,0,0.3);">
                คำนวณคะแนนรวม (Weighted Score)
            </button>
        </div>

        <div class="result-display" style="background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:16px; padding:40px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
            <p style="font-size:0.8rem; opacity:0.6; margin:0;">ESTIMATED SCORE</p>
            <h2 style="font-size:5rem; color:var(--primary-red); margin:10px 0; text-shadow: 0 0 20px rgba(204,0,0,0.3);" id="total-display">--</h2>
            <div id="target-status" style="font-size:0.7rem; padding:5px 15px; border-radius:20px; background:rgba(255,255,255,0.05); color:#888;">กรอกคะแนนเพื่อวิเคราะห์โอกาส</div>
        </div>
    </div>
</main>

<script>
function runCalculation() {
    // ดึงค่าจาก Input
    const tpat3 = parseFloat(document.getElementById('tpat3').value) || 0;
    const math1 = parseFloat(document.getElementById('math1').value) || 0;
    const physics = parseFloat(document.getElementById('physics').value) || 0;
    const english = parseFloat(document.getElementById('english').value) || 0;
    
    const nsMath = parseFloat(document.getElementById('netsatMath').value) || 0;
    const nsSci = parseFloat(document.getElementById('netsatSci').value) || 0;

    // สูตรคำนวณ (ตัวอย่างเกณฑ์ TCAS รอบ 3: TPAT3 30%, Math 30%, Phys 20%, Eng 20%)
    let totalTCAS = (tpat3 * 0.3) + (math1 * 0.3) + (physics * 0.2) + (english * 0.2);
    
    // ถ้ามีคะแนน NETSAT จะโชว์ค่าเฉลี่ย NETSAT หรือนำไปรวมตามสูตรโควตา (ปรับสูตรได้ตามประกาศ มข.)
    // ในที่นี้กูโชว์เป็นค่าเฉลี่ยถ่วงน้ำหนักรวมเพื่อให้เห็นภาพรวมความพร้อม
    let finalScore = totalTCAS;
    
    // แสดงผลคะแนน
    const display = document.getElementById('total-display');
    display.innerText = finalScore.toFixed(2);
    
    // วิเคราะห์สถานะ
    const status = document.getElementById('target-status');
    if(finalScore >= 70) {
        status.innerHTML = "🟢 โอกาสติดสูงมาก (Safe Zone)";
        status.style.color = "#00ff88";
    } else if(finalScore >= 55) {
        status.innerHTML = "🟡 โอกาสลุ้น (Competitive)";
        status.style.color = "#ffd700";
    } else {
        status.innerHTML = "🔴 ควรติวเพิ่ม (High Risk)";
        status.style.color = "#ff4d4d";
    }
}
</script>
    <script>
        function runCalculation() {
            const tpat3 = parseFloat(document.getElementById('tpat3').value) || 0;
            const math1 = parseFloat(document.getElementById('math1').value) || 0;
            const physics = parseFloat(document.getElementById('physics').value) || 0;
            const english = parseFloat(document.getElementById('english').value) || 0;

            const result = (tpat3 * 0.3) + (math1 * 0.3) + (physics * 0.2) + (english * 0.2);

            const display = document.getElementById('total-display');
            display.innerText = result.toFixed(2);

            if(result >= 70) {
                display.style.textShadow = "0 0 25px rgba(204,0,0,0.8)";
            } else {
                display.style.textShadow = "none";
            }
        }
    </script>
</body>
</html>
