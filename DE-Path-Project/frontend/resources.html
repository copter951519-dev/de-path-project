<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>DE-PATH | University Resources</title>
    <link rel="stylesheet" href="home.css">
    <style>
        /* สไตล์หลัก */
        .uni-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 25px; position: relative; z-index: 10; }
        
        .uni-card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 16px; padding: 20px; transition: 0.3s; cursor: pointer;
        }
        
        .uni-card:hover { 
            transform: translateY(-5px); border-color: var(--primary-red); 
            background: rgba(204,0,0,0.05); box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .tag {
            font-size: 0.65rem; background: rgba(255, 255, 255, 0.1); color: #fff;
            padding: 3px 10px; border-radius: 20px; margin-right: 5px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* ระบบ Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }

        .modal-content {
            background: #111; border: 1px solid var(--primary-red);
            padding: 40px; border-radius: 20px; max-width: 800px; width: 90%;
            position: relative; box-shadow: 0 0 50px rgba(204,0,0,0.2);
            max-height: 85vh; overflow-y: auto;
        }

        .close-btn { 
            position: absolute; top: 20px; right: 20px; cursor: pointer; 
            color: var(--primary-red); font-weight: bold; font-size: 1.2rem;
        }

        /* สไตล์เฉพาะสำหรับ Modal ชั้นใน (เกณฑ์คะแนน) */
        .info-box {
            text-align: left; background: rgba(255,255,255,0.03); 
            padding: 25px; border-radius: 15px; border-left: 4px solid var(--primary-red);
        }
    </style>
</head>
<body>
    <div class="main-split-bg"></div>

    <div class="modal-overlay" id="uniModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('uniModal')">✕</span>
            <h2 id="selectedUniName" style="margin-bottom: 25px; letter-spacing: 1px;">University Name</h2>
            <div class="uni-grid" id="facultyContainer"></div>
        </div>
    </div>

    <div class="modal-overlay" id="infoModal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close-btn" onclick="closeModal('infoModal')">✕</span>
            <div id="info-logo" style="width:70px; height:70px; border-radius:12px; margin: 0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; font-weight:bold; color:#fff;"></div>
            <h2 id="info-title" style="margin-bottom:5px;">Faculty Name</h2>
            <p id="info-subtitle" style="color:var(--primary-red); margin-bottom:20px; font-weight:bold; font-size:0.9rem;"></p>
            <div class="info-box">
                <strong style="color:#fff; font-size:1rem;">เกณฑ์การรับสมัคร (Admission):</strong>
                <ul id="info-list" style="margin-top:15px; padding-left:20px; color:rgba(255,255,255,0.7); line-height:2;"></ul>
            </div>
        </div>
    </div>

    <main class="content-glass" style="margin-left: 20px; position: relative; z-index: 20;">
        <h1 style="letter-spacing: 2px;">UNIVERSITY RESOURCES</h1>
        <p style="font-size:0.75rem; opacity:0.5; margin-bottom:35px;">เลือกมหาวิทยาลัยเพื่อดูข้อมูลเกณฑ์คะแนนแต่ละคณะ</p>

        <div class="uni-grid" id="mainUniGrid"></div>
    </main>

    <script>
        // 1. คลังข้อมูล 10 มหาวิทยาลัย (คณะหลักๆ)
        const uniData = {
            'CU': { name: 'Chulalongkorn University', color: '#800000', faculties: [
                { title: 'Engineering', sub: 'คณะวิศวกรรมศาสตร์', criteria: ['TPAT3: 30%', 'Math 1: 30%', 'Physics: 20%', 'English: 20%'], seats: '80-120' },
                { title: 'Science', sub: 'คณะวิทยาศาสตร์', criteria: ['A-Level Math 1: 20%', 'Chemistry: 20%', 'Biology: 20%', 'Physics: 20%', 'English: 20%'], seats: '50-100' },
                { title: 'Architecture', sub: 'คณะสถาปัตยกรรมศาสตร์', criteria: ['TPAT4: 40%', 'A-Level Math 1: 20%', 'English: 20%', 'Physics: 20%'], seats: '30-60' }
            ]},
            'KU': { name: 'Kasetsart University', color: '#006400', faculties: [
                { title: 'Engineering', sub: 'คณะวิศวกรรมศาสตร์', criteria: ['TPAT3: 30%', 'Math 1: 25%', 'Physics: 25%', 'English: 20%'], seats: '100+' },
                { title: 'Science', sub: 'คณะวิทยาศาสตร์', criteria: ['A-Level Math 1: 30%', 'Science: 40%', 'English: 30%'], seats: '120' }
            ]},
            'KMITL': { name: 'สจล. (ลาดกระบัง)', color: '#FF4500', faculties: [
                { title: 'Engineering', sub: 'คณะวิศวกรรมศาสตร์', criteria: ['TPAT3: 30%', 'A-Level Math 1: 30%', 'Physics: 20%', 'English: 20%'], seats: '200+' },
                { title: 'IT', sub: 'คณะเทคโนโลยีสารสนเทศ', criteria: ['TPAT3: 30%', 'Math 1: 40%', 'English: 30%'], seats: '80' }
            ]},
            'KMUTT': { name: 'มจธ. (บางมด)', color: '#F05A28', faculties: [
                { title: 'Engineering', sub: 'คณะวิศวกรรมศาสตร์', criteria: ['TPAT3: 40%', 'Math 1: 20%', 'Physics: 20%', 'English: 20%'], seats: '150' },
                { title: 'SIT', sub: 'School of IT', criteria: ['GPAX: 20%', 'Math 1: 40%', 'English: 40%'], seats: '60' }
            ]},
            'MU': { name: 'Mahidol University', color: '#000080', faculties: [
                { title: 'Engineering', sub: 'คณะวิศวกรรมศาสตร์', criteria: ['A-Level Math 1: 30%', 'Physics: 30%', 'English: 40%'], seats: '50' },
                { title: 'ICT', sub: 'คณะ ICT', criteria: ['Math 1: 40%', 'English: 60%'], seats: '40' }
            ]},
            'TU': { name: 'Thammasat University', color: '#FFD700', faculties: [
                { title: 'TSE', sub: 'คณะวิศวกรรมศาสตร์', criteria: ['TPAT3: 30%', 'Math 1: 30%', 'Physics: 20%', 'English: 20%'], seats: '100' },
                { title: 'Science', sub: 'คณะวิทยาศาสตร์และเทคโนฯ', criteria: ['A-Level Sci: 60%', 'Math 1: 40%'], seats: '80' }
            ]},
            'CMU': { name: 'Chiang Mai University', color: '#4B0082', faculties: [
                { title: 'Engineering', sub: 'คณะวิศวกรรมศาสตร์', criteria: ['TPAT3: 30%', 'Math 1: 30%', 'Physics: 20%', 'English: 20%'], seats: '150' }
            ]},
            'PSU': { name: 'Prince of Songkla', color: '#4169E1', faculties: [
                { title: 'Engineering', sub: 'คณะวิศวกรรมศาสตร์', criteria: ['GPAX: 20%', 'TPAT3: 40%', 'A-Level: 40%'], seats: '120' }
            ]},
            'KKU': { name: 'Khon Kaen University', color: '#A52A2A', faculties: [
                { title: 'Engineering', sub: 'คณะวิศวกรรมศาสตร์', criteria: ['NETSAT: 50%', 'TPAT3: 30%', 'English: 20%'], seats: '200' }
            ]},
            'SWU': { name: 'มศว (ประสานมิตร)', color: '#C0C0C0', faculties: [
                { title: 'Engineering', sub: 'คณะวิศวกรรมศาสตร์', criteria: ['TPAT3: 30%', 'Math 1: 40%', 'English: 30%'], seats: '60' }
            ]}
        };

        // 2. ฟังก์ชันเริ่มการทำงาน (Render หน้าแรก)
        function init() {
            const grid = document.getElementById('mainUniGrid');
            grid.innerHTML = Object.keys(uniData).map(key => `
                <div class="uni-card" onclick="openUni('${key}')">
                    <div class="uni-logo" style="background: ${uniData[key].color}; width:50px; height:50px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; margin-bottom:15px; color:#fff;">${key}</div>
                    <h3 style="font-size:1rem; margin-bottom:5px;">${uniData[key].name}</h3>
                    <p style="font-size:0.7rem; opacity:0.5;">รวมข้อมูลคณะ/วิทยาลัย</p>
                </div>
            `).join('');
        }

        // 3. ฟังก์ชันเปิด Modal มหาลัย
        function openUni(key) {
            const data = uniData[key];
            const container = document.getElementById('facultyContainer');
            document.getElementById('selectedUniName').innerText = data.name;
            
            container.innerHTML = data.faculties.map(f => `
                <div class="uni-card" onclick="showInfo('${f.title}', '${f.sub}', '${data.color}', '${key}', ${JSON.stringify(f.criteria)})">
                    <h4 style="font-size:0.9rem; margin-bottom:5px;">${f.title}</h4>
                    <p style="font-size:0.7rem; opacity:0.5; margin-bottom:12px;">${f.sub}</p>
                    <span class="tag">รับประมาณ: ${f.seats} ที่นั่ง</span>
                </div>
            `).join('');

            document.getElementById('uniModal').style.display = 'flex';
        }

        // 4. ฟังก์ชันเปิด Modal เกณฑ์คะแนน
        function showInfo(title, sub, color, short, criteria) {
            document.getElementById('info-title').innerText = title;
            document.getElementById('info-subtitle').innerText = sub;
            const logo = document.getElementById('info-logo');
            logo.style.background = color;
            logo.innerText = short;

            document.getElementById('info-list').innerHTML = criteria.map(c => `<li>${c}</li>`).join('');
            document.getElementById('infoModal').style.display = 'flex';
        }

        // 5. ฟังก์ชันปิด Modal
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // คลิกข้างนอกเพื่อปิด
        window.onclick = function(e) {
            if (e.target.className === 'modal-overlay') {
                closeModal('uniModal');
                closeModal('infoModal');
            }
        }

        // รันคำสั่งเริ่ม
        init();
    </script>
</body>
</html>
