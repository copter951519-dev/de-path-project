<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DE-Path | แบบสอบถาม</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-split-bg"></div>

    <div class="big-circle-frame">
        <div class="content-wrapper" id="survey-container">
            <div class="title-box">
                <p id="step-text" style="font-size: 12px; opacity: 0.5;">STEP 01/06</p>
                <h2 id="question-text" style="color: white; font-size: 1.8rem; margin-top: 10px;">
                    ชอบคำนวณโครงสร้างตึก/สะพาน (แรงกด-แรงดึง) ไหม?
                </h2>
            </div>

            <div class="button-group">
                <button class="btn-secondary fx-push" onclick="nextQuestion('no')">NO</button>
                <button class="btn-primary fx-push" onclick="nextQuestion('yes')">YES</button>
            </div>
        </div>
    </div>

    <script>
        // 📋 คลังคำถาม (เตรียมไว้ 6 ข้อตาม STEP)
        const questions = [
            "ชอบคำนวณโครงสร้างตึก/สะพาน (แรงกด-แรงดึง) ไหม?",
            "สนใจเรื่องวงจรไฟฟ้า หุ่นยนต์ หรือระบบอัตโนมัติหรือเปล่า?",
            "ชอบเขียนโปรแกรม พัฒนาแอป หรือจัดการข้อมูล (Data) ไหม?",
            "สนใจการออกแบบเครื่องจักร เครื่องยนต์ หรือระบบกลไกต่างๆ?",
            "ชอบวางแผนกระบวนการผลิตในโรงงาน หรือการจัดการระบบอุตสาหกรรม?",
            "สนใจเรื่องสิ่งแวดล้อม การบำบัดน้ำ หรือพลังงานสะอาดไหม?"
        ];

        let currentStep = 0; // เริ่มที่ข้อ 0 (Array index)
        let answers = [];

        window.nextQuestion = function(answer) {
            // 1. เก็บคำตอบ
            answers.push(answer);
            console.log(`ตอบข้อ ${currentStep + 1}: ${answer}`);

            // 2. ไปข้อถัดไป
            currentStep++;

            if (currentStep < questions.length) {
                // อัปเดต UI หน้าจอ
                document.getElementById('step-text').innerText = `STEP 0${currentStep + 1}/06`;
                document.getElementById('question-text').innerText = questions[currentStep];
            } else {
                // ถ้าครบ 6 ข้อแล้ว
                showProcessing();
            }
        }

        function showProcessing() {
            const container = document.getElementById('survey-container');
            container.innerHTML = `
                <div class="title-box">
                    <h2 style="color: #ff4d4d;">วิเคราะห์ผลสำเร็จ!</h2>
                    <p style="color: white; opacity: 0.8; margin-top: 10px;">กำลังส่งข้อมูลให้ AI วิเคราะห์เส้นทางวิศวกรของ ...</p>
                    <div class="loading-bar" style="width:100%; height:4px; background:rgba(255,255,255,0.1); margin-top:20px; border-radius:10px; overflow:hidden;">
                        <div style="width:100%; height:100%; background:#ff4d4d; animation: load 2s infinite;"></div>
                    </div>
                </div>
                <button class="btn-primary fx-push" style="margin-top:30px;" onclick="location.href='index.html'">กลับหน้าหลัก</button>
            `;
            console.log("คำตอบทั้งหมดของ :", answers);
            // ตรงนี้มึงสามารถส่งค่า answers ไปหา AI ใน server.mjs ต่อได้เลย
        }
    </script>

    <style>
        @keyframes load {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</body>
</html>
