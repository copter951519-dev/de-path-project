<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ========== SEO & SOCIAL META TAGS ========== -->

    <meta name="description" content="เข้าสู่ระบบหรือลงทะเบียนเพื่อเริ่มต้นใช้งาน DE-PATH แพลตฟอร์มเตรียมสอบเข้าคณะวิศวกรรมศาสตร์สำหรับเด็กไทย">
    <meta name="keywords" content="login, register, เข้าสู่ระบบ, ลงทะเบียน, de-path, เตรียมสอบวิศวะ">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-deploy-url.com/login.html"> <!-- TODO: แก้ไขเป็น URL จริงของเว็บคุณ -->
    <meta property="og:title" content="DE-PATH | Login & Register">
    <meta property="og:description" content="เข้าสู่ระบบหรือลงทะเบียนเพื่อเริ่มต้นใช้งาน DE-PATH แพลตฟอร์มเตรียมสอบเข้าคณะวิศวกรรมศาสตร์สำหรับเด็กไทย">
    <meta property="og:image" content="https://your-deploy-url.com/og-image-main.png"> <!-- TODO: ใช้รูปหลักของเว็บได้ -->

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://your-deploy-url.com/login.html"> <!-- TODO: แก้ไขเป็น URL จริงของเว็บคุณ -->
    <meta property="twitter:title" content="DE-PATH | Login & Register">
    <meta property="twitter:description" content="เข้าสู่ระบบหรือลงทะเบียนเพื่อเริ่มต้นใช้งาน DE-PATH แพลตฟอร์มเตรียมสอบเข้าคณะวิศวกรรมศาสตร์สำหรับเด็กไทย">
    <meta property="twitter:image" content="https://your-deploy-url.com/og-image-main.png"> <!-- TODO: ใช้รูปหลักของเว็บได้ -->

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-split-bg"></div>

    <div class="big-circle-frame">
        <div class="content-wrapper">
            <div class="title-box">
                <h1 id="auth-title" style="font-size: 8vmin;">LOGIN</h1>
                <p id="auth-desc" style="font-size: 1rem; opacity: 0.6;">ยืนยันตัวตนเพื่อเข้าสู่ระบบ</p>
            </div>

            <div class="login-form" style="width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 15px;">
                <input type="text" id="email" placeholder="EMAIL" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; text-align: center; outline: none;">
                <input type="password" id="pass" placeholder="PASSWORD" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; text-align: center; outline: none;">
            </div>

            <div class="button-group" style="margin-top: 30px; display: flex; flex-direction: column; gap: 15px; align-items: center;">
                <button class="btn-primary" id="main-btn" onclick="window.handleSubmit()">GO</button>
                
                <p style="font-size: 0.8rem; cursor: pointer; opacity: 0.8;" id="toggle-link" onclick="window.toggleMode()">
                    ยังไม่มีบัญชี? <span style="color: #ff4d4d; text-decoration: underline;">ลงทะเบียนที่นี่</span>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
