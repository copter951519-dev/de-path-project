    <main class="content-glass">
        <header style="border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; margin-bottom: 25px;">
            <h1 style="letter-spacing: 2px; margin:0;">RANKING LEADERBOARD</h1>
            <p style="font-size:0.7rem; opacity:0.5; margin-top:5px;">จำลองและเปรียบเทียบคะแนนของคุณกับผู้ใช้งานคนอื่น</p>
        </header>

        <div class="ranking-grid">
            <div class="input-card">
                <h3><i class="fas fa-user-plus"></i> ADD YOUR SCORE</h3>
                <div class="input-group">
                    <input type="text" id="user-name" placeholder="ชื่อผู้ใช้งาน (Username)">
                    <input type="number" id="user-points" placeholder="คะแนนรวมของคุณ">
                    <button class="btn-add" onclick="addUser()">เพิ่มอันดับ</button>
                </div>
            </div>

            <div class="leaderboard-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3><i class="fas fa-crown"></i> TOP 10 RANKING</h3>
                    <span id="user-count" style="background:rgba(255,77,77,0.1); padding:8px 18px; border-radius:12px; font-weight:800; color:var(--primary-red); border:1px solid var(--glass-border);">0 / 10</span>
                </div>
                
                <div id="rank-list-display">
                    <!-- User items will be rendered here by JavaScript -->
                </div>
            </div>
        </div>
    </main>

<script>
    let userRanks = [];

    function addUser() {
        const nameInput = document.getElementById('user-name');
        const pointsInput = document.getElementById('user-points');
        
        const name = nameInput.value.trim();
        const points = parseFloat(pointsInput.value);

        if (!name || isNaN(points)) {
            alert("กรุณากรอกชื่อและคะแนนให้ครบถ้วน");
            return;
        }

        userRanks.push({ name, points });
        userRanks.sort((a, b) => b.points - a.points);
        if (userRanks.length > 10) {
            userRanks = userRanks.slice(0, 10);
        }

        nameInput.value = '';
        pointsInput.value = '';
        
        renderUsers();
    }

    function removeUser(index) {
        userRanks.splice(index, 1);
        renderUsers();
    }

    function renderUsers() {
        const container = document.getElementById('rank-list-display');
        document.getElementById('user-count').innerText = `${userRanks.length} / 10`;
        
        if (userRanks.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-dim); padding:40px; border:1px dashed var(--glass-border); border-radius:20px;">ยังไม่มีรายชื่อผู้ใช้งานในขณะนี้...</p>`;
            return;
        }

        container.innerHTML = userRanks.map((user, i) => `
            <div class="rank-item">
                <div class="rank-num">#${i + 1}</div>
                <div class="user-info">
                    <span class="user-name">${user.name}</span>
                    <span class="user-score">${user.points.toLocaleString()} POINTS</span>
                </div>
                <button class="btn-del" onclick="removeUser(${i})"><i class="fas fa-times"></i></button>
            </div>
        `).join('');
    }

    // Initial render on page load
    renderUsers();
</script>
